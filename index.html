<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>NFT Dashboard</title>
</head>

<body style="background:#121212;color:white;font-family:Arial;padding:20px;">

<h1>📊 NFT Dashboard</h1>

<div id="app">Loading...</div>

<script>

async function loadData() {

    const response = await fetch("./data.json?t=" + Date.now());

    const data = await response.json();

    let html = "";

    if (data.length === 0) {

        html = `
        <h2>😴 No profitable NFTs found</h2>
        `;

        document.getElementById("app").innerHTML = html;
        return;
    }

    data.forEach(nft => {

        html += `
        <div style="
            background:#1e1e1e;
            padding:15px;
            margin-top:15px;
            border-radius:12px;
        ">

            <h2>${nft.name}</h2>

            <p>📥 Buy: ${nft.offer} TON</p>

            <p>📤 Sell: ${nft.floor} TON</p>

            <p>💰 Profit: ${nft.profit} TON</p>

            <p>📊 ROI: ${nft.roi}%</p>

        </div>
        `;
    });

    document.getElementById("app").innerHTML = html;
}

loadData();

setInterval(loadData, 5000);

</script>

</body>
</html>
