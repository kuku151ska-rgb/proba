<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebApp</title>
</head>
<body>

<h2>📊 NFT Dashboard</h2>

<div id="out">Loading...</div>

<script>
async function load() {
  try {
    const res = await fetch("https://kuku151ska-rgb.github.io/proba/data.json?t=" + Date.now());
    const d = await res.json();

    document.getElementById("out").innerHTML = 
      <p>🎁 ${d.name}</p>
      <p>📥 Buy: ${d.buy}</p>
      <p>📤 Sell: ${d.sell}</p>
      <p>💰 Profit: ${d.profit}</p>
      <p>📊 ROI: ${d.roi}%</p>
    ;
  } catch (e) {
    document.getElementById("out").innerHTML = "❌ ERROR LOADING DATA";
  }
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
