<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NFT Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    .profit {
      font-size: 30px;
      color: lime;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🔥 ARB DASHBOARD</h1>

<div class="card">
  <h2 id="name">Loading...</h2>
</div>

<div class="card">
  Profit:
  <div class="profit" id="profit">...</div>
</div>

<div class="card">
  Offer: <span id="offer"></span><br>
  Floor: <span id="floor"></span><br>
  ROI: <span id="roi"></span>%
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("http://YOUR_SERVER_IP:5000/data");
    const data = await res.json();

    document.getElementById("name").innerText = data.name;
    document.getElementById("profit").innerText = data.profit;
    document.getElementById("offer").innerText = data.best_offer;
    document.getElementById("floor").innerText = data.floor;
    document.getElementById("roi").innerText = data.roi;

  } catch (e) {
    document.body.innerHTML = "❌ ERROR LOADING DATA";
  }
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
